name: Release Obsidian plugin
on:
  push:
    tags:
      - "*"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Build plugin
        run: |
          npm install --legacy-peer-deps
          npm run build
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets=(main.js mermaid.bundle.js manifest.json)
          # styles.css is optional per Obsidian docs; attach only if present
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            "${assets[@]}"
